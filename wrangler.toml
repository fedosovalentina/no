name = "no"
compatibility_date = "2024-09-01"
main = "src/worker.ts"

[[routes]]
pattern = "to4no.net"
custom_domain = true

[[routes]]
pattern = "www.to4no.net"
custom_domain = true

[[kv_namespaces]]
binding = "COUNTER"
id = "fe997a19770c469fa81cf4ef12862eb0"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/", "/api/*", "/favicon.ico", "/favicon.svg", "/favicon-*", "/og", "/og.svg", "/og.jpg", "/og.png"]
